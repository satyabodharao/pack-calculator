# docker-compose for local development.
#
# A single service runs the Go server, which hosts both the JSON API and the
# static UI. Storage is in-memory, so no database service is required.
services:
  app:
    build: .
    image: pack-calculator:local
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
